services:
  - type: web
    name: procon-galvao-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: storage
      mountPath: /opt/render/project/src
      sizeGB: 1
